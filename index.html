<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmInfo Dashboard | 약학 정보 포털</title>
  <link rel="stylesheet" href="frontend/styles/style-new.css?v=20260511_v3">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/twemoji-emojis@latest/vendor/twemoji.css">

  <!-- UI Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <!-- KaTeX (Math Rendering) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>

  <script>
    mermaid.initialize({ startOnLoad: false });
    
    // 전역 마크다운 및 수식 렌더러 설정
    window.renderMarkdown = function(text) {
      if (!text) return '';
      
      // 1. 먼저 마크다운을 HTML로 변환
      const html = marked.parse(text);
      
      // 2. 임시 컨테이너를 만들어 수식 렌더링 적용
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;
      
      renderMathInElement(tempDiv, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false}
        ],
        throwOnError: false
      });
      
      return tempDiv.innerHTML;
    };
  </script>
</head>

<body>

  <!-- Header / Navigation -->
  <header class="glass-header">
    <div class="header-container">
      <div class="logo" onclick="window.app.navigateTo('/')">
        <svg fill="currentColor" viewBox="0 0 24 24" class="logo-icon">
          <path
            d="M19,3H5C3.89,3 3,3.89 3,5V19C3,20.1 3.9,21 5,21H19C20.1,21 21,20.1 21,19V5C21,3.89 20.1,3 19,3M18,14H14V18H10V14H6V10H10V6H14V10H18V14Z" />
        </svg>
        PharmInfo
      </div>

      <div class="search-container">
        <input type="text" id="global-search" placeholder="질환명 또는 약물 검색..." autocomplete="off">
      </div>

      <nav class="main-nav">
        <button class="nav-btn" data-path="/" onclick="window.app.navigateTo('/')">홈</button>
        <button class="nav-btn" data-path="/trash" id="trashNavBtn" onclick="window.app.navigateTo('/trash')" style="display:none; font-size: 13px; min-width: unset; padding: 6px 10px;">🗑️ 휴지통</button>
        <button class="nav-btn" data-path="/guidelines" onclick="window.app.navigateTo('/guidelines')">가이드라인</button>
        <button class="nav-btn" data-path="/drugs" onclick="window.app.navigateTo('/drugs')">약물 정보</button>
        <button class="nav-btn" data-path="/supplements" onclick="window.app.navigateTo('/supplements')">건기식</button>
        <div id="auth-container" style="display: flex; align-items: center; gap: 10px;">
          <button id="google-login-btn" class="nav-btn admin-mode-btn" onclick="window.app.loginWithGoogle()" style="background: white; color: var(--black); border: 2px solid var(--black); display: flex; align-items: center; gap: 8px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18">
            Google 로그인
          </button>
          <div id="user-profile" style="display: none; align-items: center; gap: 8px; font-size: 13px; font-weight: 700;">
            <img id="user-photo" src="" width="30" height="30" style="border-radius: 50%; border: 2px solid var(--black);">
            <span id="user-name"></span>
            <button class="nav-btn-sm" onclick="window.app.logout()" style="padding: 4px 8px; font-size: 11px;">로그아웃</button>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app-content" class="fade-in">
    <!-- View content loaded by app-new.js -->
  </main>

  <!-- Drug Property Modal -->
  <div id="drug-property-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content neo-card">
      <div class="modal-header">
        <h3>약물 속성 편집</h3>
        <button class="modal-close" onclick="window.app.closeDrugPropertyModal()">✖</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>성분명 (영문)</label>
          <input type="text" id="modal-drug-ingredient" class="neo-input">
        </div>
        <div class="form-group">
          <label>대조약 (국문)</label>
          <input type="text" id="modal-drug-reference" class="neo-input">
        </div>
        <div class="form-group">
          <label>중분류 (Minor Category)</label>
          <select id="modal-drug-minor" class="neo-input" onchange="window.app.handleModalMinorChange(this.value)"></select>
        </div>
        <div class="form-group">
          <label>소분류 (Sub Category)</label>
          <select id="modal-drug-sub" class="neo-input" onchange="window.app.handleModalSubChange(this.value)"></select>
        </div>
        <!-- 숨겨진 데이터 추적용 -->
        <input type="hidden" id="modal-drug-id">
        <input type="hidden" id="modal-drug-item-idx">
        <input type="hidden" id="modal-drug-major">
      </div>
      <div class="modal-footer" style="justify-content: space-between;">
        <button class="neo-btn danger" onclick="window.app.deleteDrugItem()">약물 삭제</button>
        <button class="neo-btn" onclick="window.app.saveDrugPropertyModal()">변경사항 저장</button>
      </div>
    </div>
  </div>
  <!-- Drug Detail Sidebar -->
  <div id="drug-detail-sidebar" class="neo-sidebar">
    <div class="sidebar-header">
      <h3>약물 상세 정보</h3>
      <button class="sidebar-close" onclick="window.app.closeDrugDetailSidebar()">✖</button>
    </div>
    <div class="sidebar-body">
      <div id="sidebar-content">
        <!-- Content injected by app-new.js -->
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="neo-btn" onclick="window.app.saveDrugDetails()">상세 정보 저장</button>
    </div>
  </div>

  <div id="sidebar-overlay" class="sidebar-overlay" onclick="window.app.closeDrugDetailSidebar()"></div>

  <script type="module" src="frontend/scripts/app-new.js?v=20260511_v3"></script>


  <script>console.log("PharmInfo App Loaded with cache-busting");</script>
</body>

</html>
