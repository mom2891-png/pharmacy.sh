<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmInfo Dashboard | 약학 정보 포털</title>
  <link rel="stylesheet" href="style-new.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="error-log" style="color:red; background:#ffe; padding:10px; z-index:9999; position:relative;"></div>

  <!-- Header / Navigation -->
  <header class="glass-header">
    <div class="header-container">
      <div class="logo" onclick="window.app.navigateTo('/')">
        <svg fill="currentColor" viewBox="0 0 24 24" class="logo-icon">
          <path
            d="M19,3H5C3.89,3 3,3.89 3,5V19C3,20.1 3.9,21 5,21H19C20.1,21 21,20.1 21,19V5C21,3.89 20.1,3 19,3M18,14H14V18H10V14H6V10H10V6H14V10H18V14Z" />
        </svg>
        PharmInfo
      </div>

      <div class="search-container">
        <input type="text" id="global-search" placeholder="질환명 또는 약물 검색..." autocomplete="off">
      </div>

      <nav class="main-nav">
        <button class="nav-btn" data-path="/" onclick="window.app.navigateTo('/')">홈</button>
        <button class="nav-btn" data-path="/guidelines" onclick="window.app.navigateTo('/guidelines')">가이드라인</button>
        <button class="nav-btn" data-path="/drugs" onclick="window.app.navigateTo('/drugs')">약물 정보</button>
        <button class="nav-btn" data-path="/supplements" onclick="window.app.navigateTo('/supplements')">건기식</button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app-content" class="fade-in">
    <!-- View content loaded by app-new.js -->
  </main>

  <!-- Drug Property Modal -->
  <div id="drug-property-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content neo-card">
      <div class="modal-header">
        <h3>약물 속성 편집</h3>
        <button class="modal-close" onclick="window.app.closeDrugPropertyModal()">✖</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>성분명 (영문)</label>
          <input type="text" id="modal-drug-ingredient" class="neo-input">
        </div>
        <div class="form-group">
          <label>대조약 (국문)</label>
          <input type="text" id="modal-drug-reference" class="neo-input">
        </div>
        <div class="form-group">
          <label>중분류 (Minor Category)</label>
          <select id="modal-drug-minor" class="neo-input" onchange="window.app.handleModalMinorChange(this.value)"></select>
        </div>
        <div class="form-group">
          <label>소분류 (Sub Category)</label>
          <select id="modal-drug-sub" class="neo-input" onchange="window.app.handleModalSubChange(this.value)"></select>
        </div>
        <!-- 숨겨진 데이터 추적용 -->
        <input type="hidden" id="modal-drug-id">
        <input type="hidden" id="modal-drug-item-idx">
        <input type="hidden" id="modal-drug-major">
      </div>
      <div class="modal-footer" style="justify-content: space-between;">
        <button class="neo-btn danger" onclick="window.app.deleteDrugItem()">약물 삭제</button>
        <button class="neo-btn" onclick="window.app.saveDrugPropertyModal()">변경사항 저장</button>
      </div>
    </div>
  </div>

  <script>
    // 캐시 방지를 위한 동적 스크립트 로드
    const v = Date.now();
    document.write('<script src="data.js?v=' + v + '"><\/script>');
    document.write('<script type="module" src="app-new.js?v=' + v + '"><\/script>');
  </script>
  <script>console.log("PharmInfo App Loaded with cache-busting");</script>
</body>

</html>
